services:
  inference-service:
    build:
      context: .
      dockerfile: service/Dockerfile
    image: imageaivsreal/service:local
    env_file:
      - .env
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HUGGINGFACE_HUB_TOKEN=${HF_TOKEN}
    ports:
      - "50051:50051"
    command: ["/opt/venv/bin/python", "-u", "service/inference_server.py"]